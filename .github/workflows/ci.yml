name: CI/CD Pipeline (user-service)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:
    inputs:
      run_docker:
        description: 'Build and push Docker images'
        required: false
        default: false
        type: boolean
      skip_tests:
        description: 'Skip tests (for quick builds)'
        required: false
        default: false
        type: boolean

env:
  GO_VERSION: "1.25.0"
  COVERAGE_THRESHOLD: "50"

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: go.sum

      - name: Build user-service
        working-directory: ./user-service
        run: go build ./...

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: go.sum

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4
          working-directory: ./user-service
          args: --timeout=5m

  test:
    name: Test & Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [ build, lint ]
    if: ${{ !inputs.skip_tests }}

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: go.sum

      - name: Run tests with coverage
        working-directory: ./user-service
        run: go test -coverprofile=coverage.out -covermode=atomic \
                -coverpkg=./internal/... \
                ./user-service/...

      - name: Enforce coverage threshold
        working-directory: ./user-service
        shell: bash
        run: |
          coverage=$(go tool cover -func=coverage.out | awk '/total:/ {gsub("%","",$3); print $3}')
          threshold="${{ env.COVERAGE_THRESHOLD }}"
          echo "Coverage: ${coverage}%"
          echo "Required threshold: ${threshold}%"
          if awk -v c="$coverage" -v t="$threshold" 'BEGIN { exit !(c + 0 >= t + 0) }'; then
            echo "✅ Coverage OK"
          else
            echo "❌ Coverage ${coverage}% below ${threshold}%"
            exit 1
          fi

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.out
          retention-days: 7

  docker_build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [ build, lint, test ]
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && inputs.run_docker == true)

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve Docker metadata
        id: meta
        run: |
          branch="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          branch_slug=$(echo "$branch" | tr '[:upper:]' '[:lower:]' | sed 's#[^a-z0-9._-]#-#g')
          namespace=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          short_sha=$(echo "${GITHUB_SHA}" | cut -c1-7)
          echo "namespace=$namespace" >> "$GITHUB_OUTPUT"
          echo "tag=${branch_slug}-${short_sha}" >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: docker.io/${{ steps.meta.outputs.namespace }}/loop-user-service:${{ steps.meta.outputs.tag }}

      - name: Save image
        run: |
          mkdir -p images
          docker save docker.io/${{ steps.meta.outputs.namespace }}/loop-user-service:${{ steps.meta.outputs.tag }} -o images/user-service.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-user
          path: images/

  docker_push:
    name: Push to Docker Hub
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [ docker_build ]
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.run_docker == true)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download image
        uses: actions/download-artifact@v4
        with:
          name: docker-image-user
          path: images

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push image
        run: |
          docker load -i images/user-service.tar
          docker push docker.io/${{ steps.meta.outputs.namespace }}/loop-user-service:${{ steps.meta.outputs.tag }}