name: User Service CI/CD

on:
  push:
  pull_request:

env:
  COVERAGE_THRESHOLD: "50"

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: user-service/go.mod
          cache: true
          cache-dependency-path: user-service/go.sum

      - name: Build user service
        working-directory: user-service
        run: go build ./...

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: user-service/go.mod
          cache: true
          cache-dependency-path: user-service/go.sum

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4
          working-directory: user-service
          args: --timeout=5m

  test:
    name: Test and coverage
    runs-on: ubuntu-latest
    needs: [build, lint]

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: user-service/go.mod
          cache: true
          cache-dependency-path: user-service/go.sum

      - name: Run tests with coverage
        working-directory: user-service
        run: go test -coverprofile=coverage.out -covermode=atomic -coverpkg=./internal/... ./...

      - name: Check coverage threshold
        working-directory: user-service
        run: |
          total=$(go tool cover -func=coverage.out | grep total | awk '{print substr($3, 1, length($3)-1)}')
          echo "Total coverage: $total%"

          if (( $(echo "$total < $COVERAGE_THRESHOLD" | bc -l) )); then
            echo "Coverage is below threshold ($COVERAGE_THRESHOLD%)"
            exit 1
          fi

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: user-service-coverage
          path: |
            user-service/coverage.out
            user-service/coverage.txt

  docker_build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [build, lint, test]

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: |
          branch="${GITHUB_REF_NAME}"
          branch_slug=$(echo "$branch" | tr '[:upper:]' '[:lower:]' | tr -cd 'a-z0-9._-')
          short_sha=$(echo "${GITHUB_SHA}" | cut -c1-7)
      
          echo "tag=${branch_slug}-${short_sha}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./user-service
          file: ./user-service/Dockerfile
          push: false
          load: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/user-service:${{ steps.meta.outputs.tag }}

      - name: Save Docker image
        shell: bash
        run: |
          mkdir -p images
          docker save docker.io/${{ secrets.DOCKERHUB_USERNAME }}/user-service:${{ steps.meta.outputs.tag }} -o images/user-service.tar

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: user-service-image
          path: images/user-service.tar

  docker_push:
    name: Docker push
    runs-on: ubuntu-latest
    needs: [docker_build]
    if: github.event_name == 'push'

    steps:
      - name: Set image tag
        id: meta
        run: |
          branch="${GITHUB_REF_NAME}"
          branch_slug=$(echo "$branch" | tr '[:upper:]' '[:lower:]' | tr -cd 'a-z0-9._-')
          short_sha=$(echo "${GITHUB_SHA}" | cut -c1-7)
      
          echo "tag=${branch_slug}-${short_sha}" >> "$GITHUB_OUTPUT"

      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: user-service-image
          path: images

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Load and push Docker image
        shell: bash
        run: |
          docker load -i images/user-service.tar
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/user-service:${{ steps.meta.outputs.tag }}
